<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #0b0d11;
      color: #e2e6f0;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .logo { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 14px; letter-spacing: -.02em; }
    .logo span { color: #4ade80; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #7a849e; flex-shrink: 0; }
    .dot.running { background: #4ade80; box-shadow: 0 0 6px #4ade8066; animation: pulse 1.5s infinite; }
    .status-text { color: #e2e6f0; font-size: 13px; }
    .platform { font-size: 11px; color: #7a849e; margin-bottom: 12px; min-height: 14px; }
    .stat { font-size: 12px; color: #7a849e; margin-bottom: 14px; min-height: 14px; }
    button {
      width: 100%; padding: 9px 12px; border-radius: 6px; border: none;
      font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500;
      margin-bottom: 6px; transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .btn-open { background: #1a1f2e; color: #4ade80; border: 1px solid #4ade8040; }
    .btn-stop { background: #3f1515; color: #f87171; border: 1px solid #f8717140; display: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
  <div class="logo"><span>Apply</span>Pilot</div>
  <div class="row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Idle</span>
  </div>
  <div class="platform" id="platformText"></div>
  <div class="stat" id="stat"></div>
  <button class="btn-open" id="openBtn">Open ApplyPilot ↗</button>
  <button class="btn-stop" id="stopBtn">⏹ Stop bot</button>
  <script src="popup.js"></script>
</body>
</html>
